<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>lume. | Instant Lightness</title>
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://va.vercel-scripts.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; worker-src 'self' blob: data:; child-src 'self' blob:; connect-src 'self' https://vitals.vercel-insights.com; object-src 'none'; base-uri 'self';" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="/src/styles/input.css" />
  
  <script type="module" src="/src/js/main.js"></script>
</head>

<body class="selection:bg-accent/30">
  <div class="aura"></div>

  <!-- Minimal Header -->
  <nav class="relative z-50 flex items-center justify-between px-6 py-6 max-w-7xl mx-auto w-full reveal">
    <a href="/" class="text-2xl font-bold tracking-tighter smooth-transition hover:opacity-70">lume.</a>
    
    <div class="relative z-[60] group" id="theme-selector">
      <button class="w-10 h-10 flex items-center justify-center rounded-full border border-card-border glass-card smooth-transition active:scale-95" id="theme-menu-button" type="button" aria-label="Toggle theme menu" aria-expanded="false" aria-controls="theme-dropdown">
        <svg id="theme-icon-monitor" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <svg id="theme-icon-light" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2m0 16v2m10-10h-2M4 12H2m17.07-7.07-1.42 1.42M6.35 17.65l-1.42 1.42m14.14 0-1.42-1.42M6.35 6.35 4.93 4.93"/></svg>
        <svg id="theme-icon-dark" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
      
      <div class="absolute right-0 mt-2 w-40 glass-card rounded-2xl border border-card-border hidden overflow-hidden z-[100] origin-top-right transition-[opacity,transform] duration-200 ease-[cubic-bezier(0.23,1,0.32,1)] opacity-0 scale-95" id="theme-dropdown" aria-hidden="true">
        <button class="w-full px-4 py-3 text-left text-sm hover:bg-accent/10 smooth-transition flex items-center justify-between group" type="button" data-theme="light">
          <span>Light</span>
          <svg class="w-4 h-4 text-accent hidden" data-check fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
        <button class="w-full px-4 py-3 text-left text-sm hover:bg-accent/10 smooth-transition flex items-center justify-between group" type="button" data-theme="dark">
          <span>Dark</span>
          <svg class="w-4 h-4 text-accent hidden" data-check fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
        <button class="w-full px-4 py-3 text-left text-sm hover:bg-accent/10 smooth-transition flex items-center justify-between group" type="button" data-theme="system">
          <span>System</span>
          <svg class="w-4 h-4 text-accent hidden" data-check fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Stage -->
  <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-6 py-12">
    <div class="w-full max-w-xl text-center mb-10 reveal-delay reveal">
      <h1 class="text-5xl sm:text-7xl font-bold tracking-tighter mb-4 leading-[0.9]">
        Instant visual <br/>
        <span class="text-accent italic">lightness.</span>
      </h1>
      <p class="text-fg/60 text-lg font-medium tracking-tight">
        Private, browser-level image optimization.
      </p>
    </div>

    <!-- The Stage: Dropzone -->
    <div class="w-full max-w-2xl reveal-delay reveal">
      <div id="drop-zone" class="glass-card rounded-[32px] p-8 sm:p-16 flex flex-col items-center justify-center min-h-[320px] border-2 border-dashed border-accent/20 group cursor-pointer smooth-transition hover:border-accent/50 hover:shadow-2xl hover:shadow-accent/5">
        <div class="w-20 h-20 rounded-3xl bg-accent/10 flex items-center justify-center mb-8 group-hover:scale-110 smooth-transition">
          <svg class="w-10 h-10 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        </div>
        <h2 class="text-2xl font-bold tracking-tight mb-2">Drop your photos</h2>
        <p class="text-fg/40 font-medium text-sm mb-8">WEBP, PNG, JPEG, AVIF up to 50MB</p>
        
        <button id="select-files-btn" class="btn-primary px-8 py-3 rounded-full font-bold text-sm">
          Select Files
        </button>
        <input type="file" id="file-input" class="hidden" accept="image/*" multiple />
      </div>

      <!-- Active State (Hidden by default) -->
      <div id="active-compression-section" class="hidden mt-8 space-y-4">
        <div class="flex items-center justify-between mb-4 px-2">
          <h3 class="font-bold tracking-tight">Optimizing...</h3>
          <span class="text-xs font-black uppercase tracking-widest text-accent animate-pulse" id="active-compression-count">Processing</span>
        </div>
        <div id="active-jobs-list" class="space-y-3"></div>
      </div>

      <!-- Result State (Hidden by default) -->
      <div id="completed-compression-section" class="hidden mt-8 text-center">
        <button id="download-all-btn" class="btn-primary w-full py-4 rounded-2xl font-bold flex items-center justify-center space-x-2">
          <span>Download All</span>
          <span id="download-btn-text" class="opacity-70 text-xs">(0 KB)</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 px-6 py-8 text-center reveal">
    <p class="text-[10px] font-black uppercase tracking-[0.2em] text-fg/20">
      &copy; 2024 lume studio &bull; local processing
    </p>
  </footer>
</body>

</html>
